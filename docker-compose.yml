services:
  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.local
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env
    environment:
      COSYVOICE_URL: http://cosyvoice:50000
    depends_on:
      - cosyvoice

  cosyvoice:
    build:
      context: ./services/cosyvoice
    ports:
      - "50000:50000"
    environment:
      COSYVOICE_MODEL_DIR: ${COSYVOICE_MODEL_DIR:-iic/CosyVoice2-0.5B}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      MODELSCOPE_CACHE: /models/modelscope
      HF_HOME: /models/huggingface
      TORCH_HOME: /models/torch
    volumes:
      - cosyvoice_models:/models

volumes:
  cosyvoice_models:
